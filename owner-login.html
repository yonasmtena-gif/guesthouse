<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Owner Login - Abyssinia Rentals</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Plus+Jakarta+Sans:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
body { font-family: Inter, sans-serif; background: #fbf9f8; color: #1b1c1c; }
.font-display { font-family: "Plus Jakarta Sans", sans-serif; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="min-h-screen">
<header class="h-16 bg-white border-b border-[#f0eded] flex items-center justify-between px-5 md:px-10">
<a class="flex items-center gap-3 text-[#b52330] font-display font-extrabold text-xl" href="index.html">
<span class="material-symbols-outlined">home_work</span>
<span>Abyssinia Rentals</span>
</a>
<a class="text-sm font-semibold text-[#5a403f] hover:text-[#b52330]" href="admin-login.html">Admin Login</a>
</header>
<main class="min-h-[calc(100vh-4rem)] grid place-items-center px-5 py-10">
<section class="w-full max-w-md bg-white border border-[#e2bebc] rounded-2xl shadow-sm p-6 md:p-8">
<div class="w-12 h-12 rounded-xl bg-[#8eeff4] text-[#00696d] flex items-center justify-center mb-5">
<span class="material-symbols-outlined">real_estate_agent</span>
</div>
<h1 class="font-display text-2xl font-bold text-[#00696d] mb-2">Owner Login</h1>
<p class="text-sm text-[#5a403f] mb-6">Update availability, nightly price, and property status.</p>
<form class="space-y-4" data-login-role="owner" data-target="owner-dashboard.html">
<label class="block">
<span class="text-xs font-bold uppercase tracking-wide text-[#8e706f]">Email</span>
<input class="mt-1 w-full rounded-xl border-[#e2bebc] focus:border-[#00696d] focus:ring-[#00696d]" name="email" type="email" placeholder="owner@ethiostay.com" required/>
</label>
<label class="block">
<span class="text-xs font-bold uppercase tracking-wide text-[#8e706f]">Password</span>
<input class="mt-1 w-full rounded-xl border-[#e2bebc] focus:border-[#00696d] focus:ring-[#00696d]" name="password" type="password" placeholder="Enter password" required/>
</label>
<p class="hidden rounded-lg bg-[#ffdad6] px-3 py-2 text-sm text-[#93000a]" data-login-error>Enter an email and password to continue.</p>
<button class="w-full h-12 rounded-xl bg-[#00696d] text-white font-bold hover:bg-[#004f52] active:scale-[0.99] transition" type="submit">Sign In</button>
</form>
<p class="mt-5 text-xs leading-relaxed text-[#8e706f]">Prototype access only. Real owner accounts need secure authentication before publishing live availability updates.</p>
</section>
</main>
<script src="portal.js"></script>
</body>
</html>
